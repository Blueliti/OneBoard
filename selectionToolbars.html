<!-- Boutons de la sélection, en vrai DOM (pas d'iframe) : le JS (layoutToolbars)
     les répartit entre ces 4 barres selon la taille de la sélection.
     - topBar    : au-dessus (barre horizontale)
     - leftBar   : à gauche  (barre verticale)
     - rightBar  : à droite  (overflow : close + layers quand c'est trop étroit)
     - bottomBar : en bas    (overflow : boutons verticaux qui ne tiennent pas en hauteur) -->
<div id="selToolbars">
  <style>
    .selBar {
      position: fixed;
      display: flex;
      gap: 6px;
      padding: 4px;
      background: #252525;
      border-radius: 14px;
      box-shadow: -2px 2px 8px rgba(0, 0, 0, 0.4);
      z-index: 10000;
    }
    /* une barre vide (pas d'overflow) est cachée */
    .selBar:empty { display: none; }
    #topBar, #bottomBar { flex-direction: row; }
    #leftBar, #rightBar { flex-direction: column; }

    #selToolbars button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #3f3f3f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #selToolbars button:hover { background: #ffa800; }
    #selToolbars svg { width: 24px; height: 24px; stroke: white; fill: none; }
  </style>

  <!-- BARRE HAUT (horizontale) : ordre close, undo, redo, lock, plus, layers -->
  <div id="topBar" class="selBar">
    <button id="sel-close"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6l-12 12"/><path d="M6 6l12 12"/></svg></button>
    <button id="sel-undo"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14l-4 -4l4 -4"/><path d="M5 10h11a4 4 0 1 1 0 8h-1"/></svg></button>
    <button id="sel-redo"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l4 -4l-4 -4"/><path d="M19 10h-11a4 4 0 1 0 0 8h1"/></svg></button>
    <button id="sel-lock"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></svg></button>
    <button id="sel-plus"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l0 14"/><path d="M5 12l14 0"/></svg></button>
    <button id="sel-layers"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2l0 -8"/><path d="M16 16v2a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-8a2 2 0 0 1 2 -2h2"/></svg></button>
  </div>

  <!-- BARRE GAUCHE (verticale) : board, pencil, grid, perspective, palette, infos -->
  <div id="leftBar" class="selBar">
    <button id="sel-board"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12"/><path d="M4 9h8"/><path d="M12 15h8"/><path d="M12 4v16"/></svg></button>
    <button id="sel-pencil"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"/><path d="M13.5 6.5l4 4"/></svg></button>
    <button id="sel-grid"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h18"/><path d="M3 16h18"/><path d="M8 3v18"/><path d="M16 3v18"/></svg></button>
    <button id="sel-perspective"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.141 4.163l12 1.714a1 1 0 0 1 .859 .99v10.266a1 1 0 0 1 -.859 .99l-12 1.714a1 1 0 0 1 -1.141 -.99v-13.694a1 1 0 0 1 1.141 -.99"/></svg></button>
    <button id="sel-palette"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 0 1 0 -18c4.97 0 9 3.582 9 8c0 1.06 -.474 2.078 -1.318 2.828c-.844 .75 -1.989 1.172 -3.182 1.172h-2.5a2 2 0 0 0 -1 3.75a1.3 1.3 0 0 1 -1 2.25"/><path d="M7.5 10.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/><path d="M11.5 7.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/><path d="M15.5 10.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/></svg></button>
    <button id="sel-infos"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9h.01"/><path d="M11 12h1v4h1"/></svg></button>
  </div>

  <!-- overflow : remplies par le JS, vides = cachées -->
  <div id="rightBar" class="selBar"></div>
  <div id="bottomBar" class="selBar"></div>
</div>
