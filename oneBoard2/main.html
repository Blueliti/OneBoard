<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompTool</title>
  <link rel="stylesheet" href="css/variables.css">
</head>
    <body id="cursor">  

        <div class="selection"></div>
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icon-tabler-pencil" id="pencilCursor">
            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
            <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"/>
            <path d="M13.5 6.5l4 4"/>
        </svg>

        <div class="toolBar" id="toolBarAll">
            <div class="toolBar" id="toolBarVertical">
                <button class="btnV" id="refSheetBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-board" id="boardIcn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -12" />
                            <path d="M4 9h8" />
                            <path d="M12 15h8" />
                            <path d="M12 4v16" />
                        </svg>
                    </button>
                <div id="toolBarBox">
                    <button class="btnV" id="pencilBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icon-tabler-pencil" id="pencilIcn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M4 20h4l10.5 -10.5a2.828 2.828 0 1 0 -4 -4l-10.5 10.5v4"/>
                            <path d="M13.5 6.5l4 4"/>
                        </svg>
                    </button>
                    <button class="btnV" id="gridBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icon-tabler-grid-3x3" id="gridIcn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M3 8h18" />
                            <path d="M3 16h18" />
                            <path d="M8 3v18" />
                            <path d="M16 3v18" />
                        </svg>
                    </button>
                    <button class="btnV" id="perspectiveBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-perspective" id="perspectiveIcn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M6.141 4.163l12 1.714a1 1 0 0 1 .859 .99v10.266a1 1 0 0 1 -.859 .99l-12 1.714a1 1 0 0 1 -1.141 -.99v-13.694a1 1 0 0 1 1.141 -.99" />
                        </svg>
                    </button>
                    <button class="btnV" id="paletteBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-palette" id="paletteIcn">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                            <path d="M12 21a9 9 0 0 1 0 -18c4.97 0 9 3.582 9 8c0 1.06 -.474 2.078 -1.318 2.828c-.844 .75 -1.989 1.172 -3.182 1.172h-2.5a2 2 0 0 0 -1 3.75a1.3 1 0 0 1 -1 2.25" />
                            <path d="M7.5 10.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                            <path d="M11.5 7.5a1                            1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                            <path d="M15.5 10.5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" />
                        </svg>
                    </button>
                    <button class="btnV" id="infosBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-info-small" id="infosIcn">
                            <path stroke="none" d="M0 0h24v     24H0z" fill="none" />
                            <path d="M12 9h.01" />
                            <path d="M11 12h1v4h1" />
                        </svg>
                    </button>                                                                                          
                </div>
            </div>

            <div class="toolBar" id="toolBarHorizontal">

                <div id="toolBarLeft">

                    <button class="btnH" id="cross">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" id="closeIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M18 6l-12 12" />
                        <path d="M6 6l12 12" />
                        </svg>
                    </button>
                    <button class="btnH" id="undo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" id="undoIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M9 14l-4 -4l4 -4" />
                        <path d="M5 10h11a4 4 0 1 1 0 8h-1" />
                        </svg>
                    </button>
                    <button class="btnH" id="redo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" id="redoIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M15 14l4 -4l-4 -4" />
                        <path d="M19 10h-11a4 4 0 1 0 0 8h1" />
                        </svg>
                    </button>
                </div>

                <div id="toolBarMiddle">

                    <button class="btnH" id="rectangle"></button>
                    <button class="btnH" id="lock">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-lock" id="lockIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6" />
                        <path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0" />
                        <path d="M8 11v-4a4 4 0 1 1 8 0v4" />
                        </svg>
                    </button>
                </div>

                <div id="toolBarRight">

                    <button class="btnH" id="plus">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-plus" id="plusIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M12 5l0 14" />
                        <path d="M5 12l14 0" />
                        </svg>
                    </button>
                    <button class="btnH" id="layers">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layers-subtract" id="layersIcn">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path d="M8 6a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2l0 -8" />
                        <path d="M16 16v2a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2v-8a2 2 0 0 1 2 -2h2" />
                        </svg>
                    </button>
                </div>
            </div>
          
        </div>









        <script src="jsScript/uiEventDrawSelection/mouseDown.js"></script>
        <script src="jsScript/uiEventDrawSelection/mouseMoove.js"></script>
        <script src="jsScript/uiEventDrawSelection/mouseUp.js"></script>
        <script src="jsScript/uiButton/hidingCursor.js"></script>

        <script>
        let isDragging = false;
        let selectionDone = false;   
        const pencilCursor = document.getElementById("pencilCursor");
        const selection = document.querySelector(".selection");
        document.addEventListener("mousedown", mouseDown);
        document.addEventListener("mousemove", mouseMoove);
        document.addEventListener("mouseup", mouseUp);
        hidingCursor();

        </script>


  
    </body>
</html>
