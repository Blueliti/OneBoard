<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel=stylesheet href="/variables.css">
  <title>Toolbars</title>
  <style>

    /* chaque barre est chargée dans son propre iframe : elle apporte son CSS
       et exécute ses propres fetch() relatifs, donc pas de conflit ni de chemin cassé */
    .Toolbar {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      padding: 16px;
    }

    /* la barre horizontale : pleine largeur, hauteur juste suffisante */
    #horizontalFrame {
      border: none;
      width: 100%;
      height: 80px;
      background: transparent;
    }

    /* la barre verticale : fond transparent, pas de bordure */
    #verticalFrame {
      border: none;
      width: 120px;
      height: 420px;
      background: transparent;
    }
  </style>
</head>

<body class="all">
  <div class="Toolbar">
    <!-- barre horizontale : page auto-suffisante (lien /variables.css + filtre SVG) -->
    <iframe id="horizontalFrame" src="toolBarHorizontal/ToolBarHorizontal.html"></iframe>

    <!-- barre verticale : page auto-suffisante (assemble ses morceaux via fetch) -->
    <iframe id="verticalFrame" src="toolbarVertical/ToolBarVertical.html"></iframe>
  </div>
</body>
</html>
