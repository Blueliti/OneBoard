<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel=stylesheet href="/variablesH.css">
  <title>Toolbars</title>
  <style>

    /* chaque barre est chargée dans son propre iframe : elle apporte son CSS
       et exécute ses propres fetch() relatifs, donc pas de conflit ni de chemin cassé */
    .Toolbar {
      display: flex;
      align-items: flex-start;   /* les deux iframes démarrent en haut (y = 0) */
      gap: 16px;
      padding: 16px;
    }

    /* la barre verticale : à GAUCHE. Le refSheet (100px de haut) est tout en haut,
       donc son centre est à 50px du haut de l'iframe. La boîte est déjà centrée
       sous le refSheet (align-items:center dans ToolBarVertical). */
    #verticalFrame {
      border: none;
      width: 140px;   /* assez large pour ne pas rogner le refSheet centré */
      height: 420px;
      background: transparent;
    }

    /* la barre horizontale : à DROITE, centrée sur le centre du refSheet (axe x).
       refSheet : padding 16px + moitié de 100px = centre à 66px du haut.
       barre : bouton 44px + marge 4px -> son centre est à 26px du haut de l'iframe.
       margin-top:40px décale la barre pour que 40 + 26 = 66px = centre du refSheet.
       height:70px : assez pour ne pas couper la barre (52px + ombre). */
    #horizontalFrame {
      border: none;
      flex: 1;
      height: 70px;
      margin-top: 40px;
      background: transparent;
    }
  </style>
</head>

<body class="all">
  <div class="Toolbar">
    <!-- barre verticale à GAUCHE : page auto-suffisante (assemble ses morceaux via fetch) -->
    <iframe id="verticalFrame" src="toolbarVertical/ToolBarVertical.html"></iframe>

    <!-- barre horizontale à DROITE : page auto-suffisante (lien /variablesH.css + filtre SVG) -->
    <iframe id="horizontalFrame" src="toolBarHorizontal/ToolBarHorizontal.html"></iframe>
  </div>
</body>
</html>
